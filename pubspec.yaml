name: cnn
description: "Nandi Scan - Cattle Breed Prediction and Health Management"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.10.1
  flutter_riverpod: ^3.0.0
  shared_preferences: ^2.3.2
  image_picker: ^1.2.1
  http: ^1.1.0
  path_provider: ^2.1.1
  google_fonts: ^8.0.2
  riverpod_annotation: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

